name: Codex Lite CI

on:
  pull_request:
    paths:
      - 'codex-lite/**'
      - '.github/workflows/ci.yml'
  push:
    branches:
      - main
    paths:
      - 'codex-lite/**'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

jobs:
  frontend:
    name: Frontend typecheck and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: codex-lite

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: codex-lite/pnpm-lock.yaml

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck frontend
        run: pnpm typecheck

      - name: Build frontend
        run: pnpm build

  rust:
    name: Rust check and tests (${{ matrix.platform }})
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - macos-latest
          - ubuntu-22.04
    defaults:
      run:
        working-directory: codex-lite

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux Tauri dependencies
        if: startsWith(matrix.platform, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            pkg-config \
            wget
        working-directory: .

      - name: Check Rust
        run: cargo check
        working-directory: codex-lite/src-tauri

      - name: Test Rust
        run: cargo test
        working-directory: codex-lite/src-tauri

  smoke:
    name: Web UI smoke tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: codex-lite

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: codex-lite/pnpm-lock.yaml

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Web UI smoke tests
        run: pnpm smoke:ci
